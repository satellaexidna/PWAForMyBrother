<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#06060c">
    <meta name="description" content="Создавайте интерактивные истории с помощью ИИ">
    <link rel="manifest" href="manifest.json">
    <title>StoryCraft - Интерактивные истории</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box; 
        }

        :root {
            --bg-primary: #06060c;
            --bg-secondary: #0e0e1a;
            --bg-card: #13132a;
            --accent: #7c3aed;
            --accent-glow: #a78bfa;
            --accent-secondary: #06b6d4;
            --text-primary: #f1f1f6;
            --text-secondary: #8b8ba6;
            --border: rgba(124, 58, 237, 0.15);
            --border-glow: rgba(124, 58, 237, 0.3);
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --glass: rgba(19, 19, 42, 0.7);
            --glass-hover: rgba(19, 19, 42, 0.9);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            background-image:
                radial-gradient(ellipse at 15% 50%, rgba(124, 58, 237, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 30%, rgba(6, 182, 212, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(124, 58, 237, 0.04) 0%, transparent 50%);
            min-height: 100vh;
            color: var(--text-primary);
            -webkit-tap-highlight-color: transparent;
            letter-spacing: -0.01em;
            overflow-x: hidden;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 12px;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--accent-glow);
            border-radius: 50%;
            animation: float-particle 8s infinite;
            opacity: 0;
        }

        @keyframes float-particle {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        .particle:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 6s; }
        .particle:nth-child(2) { left: 25%; animation-delay: 2s; animation-duration: 8s; }
        .particle:nth-child(3) { left: 40%; animation-delay: 4s; animation-duration: 7s; }
        .particle:nth-child(4) { left: 55%; animation-delay: 1s; animation-duration: 9s; }
        .particle:nth-child(5) { left: 70%; animation-delay: 3s; animation-duration: 6.5s; }
        .particle:nth-child(6) { left: 85%; animation-delay: 5s; animation-duration: 7.5s; }
        .particle:nth-child(7) { left: 15%; animation-delay: 6s; animation-duration: 8.5s; }
        .particle:nth-child(8) { left: 60%; animation-delay: 1.5s; animation-duration: 5.5s; }

        .main-menu {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            min-height: 80dvh;
            gap: 40px;
        }

        .logo-container {
            text-align: center;
            position: relative;
        }

        .logo-icon {
            font-size: 64px;
            margin-bottom: 16px;
            filter: drop-shadow(0 0 40px rgba(124, 58, 237, 0.6));
            animation: float-logo 4s ease-in-out infinite;
        }

        @keyframes float-logo {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-10px) rotate(-3deg); }
            75% { transform: translateY(6px) rotate(3deg); }
        }

        .logo-title {
            font-family: 'Playfair Display', serif;
            font-size: 44px;
            font-weight: 700;
            background: linear-gradient(135deg, #c4b5fd 0%, #67e8f9 40%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            filter: drop-shadow(0 0 20px rgba(124, 58, 237, 0.3));
        }

        .logo-subtitle {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-top: 4px;
            font-weight: 500;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
        }

        .btn {
            padding: 16px 24px;
            border: none;
            border-radius: 18px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            letter-spacing: -0.01em;
        }

        .btn:active { transform: scale(0.96); }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed 0%, #6366f1 50%, #8b5cf6 100%);
            color: white;
            box-shadow: 0 8px 32px rgba(124, 58, 237, 0.35);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-primary:active { box-shadow: 0 4px 16px rgba(124, 58, 237, 0.5); }
        .btn-primary:disabled { opacity: 0.5; transform: none; }

        .btn-secondary {
            background: var(--glass);
            color: var(--text-primary);
            border: 1px solid var(--border);
            backdrop-filter: blur(20px);
        }

        .btn-secondary:active {
            border-color: var(--accent-glow);
            background: var(--glass-hover);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.2);
            font-size: 12px;
            padding: 8px 14px;
            width: auto;
            border-radius: 12px;
            font-weight: 500;
        }

        .btn-danger:active { background: rgba(239, 68, 68, 0.25); }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 13px;
            padding: 10px 18px;
            border-radius: 14px;
            font-weight: 500;
            width: auto;
        }

        .btn-outline:active {
            border-color: var(--accent-glow);
            color: var(--text-primary);
            background: rgba(124, 58, 237, 0.1);
        }

        .btn-outline.danger {
            border-color: rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }
        .btn-outline.danger:active { background: rgba(239, 68, 68, 0.15); }

        .btn-sm {
            padding: 8px 14px;
            font-size: 12px;
            border-radius: 12px;
            width: auto;
            font-weight: 500;
        }

        .screen {
            display: none;
            flex: 1;
            position: relative;
            z-index: 1;
        }

        .screen.active { display: flex; flex-direction: column; }

        .screen-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 4px 16px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
            gap: 12px;
        }

        .back-btn {
            background: var(--glass);
            border: 1px solid var(--border);
            color: var(--text-primary);
            width: 42px;
            height: 42px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(20px);
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .back-btn:active {
            background: rgba(124, 58, 237, 0.2);
            border-color: var(--accent);
        }

        .screen-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
            flex: 1;
            text-align: center;
            letter-spacing: -0.3px;
        }

        .tab-buttons {
            display: flex;
            gap: 6px;
            background: var(--glass);
            border-radius: 14px;
            padding: 4px;
            border: 1px solid var(--border);
            backdrop-filter: blur(20px);
        }

        .tab-btn {
            padding: 8px 16px;
            border-radius: 11px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .tab-btn.active {
            background: rgba(124, 58, 237, 0.3);
            color: var(--text-primary);
            box-shadow: 0 2px 8px rgba(124, 58, 237, 0.2);
        }

        .input-field {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--glass);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            backdrop-filter: blur(20px);
            transition: all 0.3s;
            resize: vertical;
            letter-spacing: -0.01em;
            -webkit-user-select: text;
            user-select: text;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--accent-glow);
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.08), 0 0 24px rgba(124, 58, 237, 0.1);
        }

        .input-field::placeholder { color: var(--text-secondary); }

        .story-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .story-content {
            flex: 1;
            overflow-y: auto;
            padding: 22px;
            background: var(--glass);
            border-radius: 20px;
            border: 1px solid var(--border);
            backdrop-filter: blur(20px);
            line-height: 1.85;
            font-size: 14.5px;
            letter-spacing: 0.01em;
            max-height: 45vh;
            max-height: 45dvh;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.2);
            -webkit-user-select: text;
            user-select: text;
        }

        .chapter-badge {
            display: inline-block;
            padding: 7px 16px;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.2), rgba(6, 182, 212, 0.1));
            border: 1px solid rgba(124, 58, 237, 0.3);
            border-radius: 22px;
            font-size: 11px;
            color: #c4b5fd;
            margin-bottom: 18px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .chapter-text {
            text-align: justify;
            hyphens: auto;
            font-family: 'Inter', serif;
        }

        .chapter-text p { margin-bottom: 14px; text-indent: 0; }

        .quality-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .quality-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            border-radius: 18px;
            font-size: 11px;
            font-weight: 500;
        }

        .badge-enhanced {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.25);
            color: #fcd34d;
        }

        .badge-proofread {
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid rgba(6, 182, 212, 0.25);
            color: #67e8f9;
        }

        .chapter-controls {
            display: flex;
            gap: 8px;
            margin-top: 4px;
            flex-wrap: wrap;
        }

        .action-input-container {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .action-input {
            flex: 1;
            padding: 15px 18px;
            border-radius: 18px;
            border: 1px solid var(--border);
            background: var(--glass);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            backdrop-filter: blur(20px);
            transition: all 0.3s;
            -webkit-user-select: text;
            user-select: text;
        }

        .action-input:focus {
            outline: none;
            border-color: var(--accent-secondary);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1), 0 0 18px rgba(6, 182, 212, 0.1);
        }

        .action-input::placeholder { color: var(--text-secondary); font-size: 13px; }

        .btn-send {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--accent), #6366f1);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.35);
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .btn-send:active { transform: scale(0.9); }
        .btn-send:disabled { opacity: 0.4; transform: none; }

        .characters-count {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            background: rgba(124, 58, 237, 0.08);
            border: 1px solid rgba(124, 58, 237, 0.15);
            border-radius: 16px;
            font-size: 11px;
            color: #a78bfa;
            font-weight: 500;
        }

        .library-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            flex: 1;
            padding-bottom: 20px;
        }

        .library-item {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 18px;
            cursor: pointer;
            backdrop-filter: blur(20px);
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .library-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, var(--accent), transparent);
            border-radius: 0 3px 3px 0;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .library-item:active { border-color: var(--accent-glow); transform: scale(0.98); }
        .library-item:active::before { opacity: 1; }

        .library-item-info { flex: 1; cursor: pointer; min-width: 0; }

        .library-item-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .library-item-meta {
            font-size: 11px;
            color: var(--text-secondary);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .library-item-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            margin-left: 12px;
        }

        .characters-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            flex: 1;
            padding-bottom: 20px;
        }

        .character-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 18px;
            backdrop-filter: blur(20px);
            transition: all 0.3s;
        }

        .character-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 12px;
        }

        .character-avatar {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
            box-shadow: 0 4px 16px rgba(124, 58, 237, 0.3);
        }

        .character-info h3 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .character-info .role {
            font-size: 11px;
            color: var(--accent-glow);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .character-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .character-traits {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }

        .trait-tag {
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 11px;
            background: rgba(124, 58, 237, 0.1);
            border: 1px solid rgba(124, 58, 237, 0.2);
            color: #c4b5fd;
        }

        .add-character-btn { margin-top: 8px; }

        .loading-container {
            text-align: center;
            padding: 30px;
        }

        .spinner-ring {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(124, 58, 237, 0.15);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 18px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text { color: var(--text-secondary); font-size: 13px; font-weight: 500; }

        .progress-steps {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 18px 0;
            padding: 0 10px;
        }

        .progress-step {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: var(--text-secondary);
            opacity: 0.4;
            transition: all 0.4s;
            font-weight: 500;
        }

        .progress-step.active { opacity: 1; color: var(--text-primary); }
        .progress-step.done { opacity: 1; color: var(--success); }

        .step-indicator {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid currentColor;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            flex-shrink: 0;
        }

        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 22px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 600;
            z-index: 1000;
            backdrop-filter: blur(24px);
            animation: slideUp 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: -0.01em;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .toast-success {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid rgba(16, 185, 129, 0.35);
            color: #6ee7b7;
        }
        .toast-error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.35);
            color: #fca5a5;
        }
        .toast-info {
            background: rgba(6, 182, 212, 0.2);
            border: 1px solid rgba(6, 182, 212, 0.35);
            color: #67e8f9;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
        .empty-state-icon { font-size: 52px; margin-bottom: 16px; opacity: 0.4; }
        .empty-state h3 { font-size: 15px; color: var(--text-primary); margin-bottom: 6px; }
        .empty-state p { font-size: 13px; }

        .label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in { animation: fadeInUp 0.4s ease-out; }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-box {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 20px;
            padding: 24px;
            max-width: 340px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .modal-box h4 { font-size: 16px; margin-bottom: 8px; color: var(--text-primary); }
        .modal-box p { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; line-height: 1.5; }
        .modal-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    </style>
</head>
<body>
    <div class="particles">
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div>
    </div>

    <div class="app-container">
        <div id="mainScreen" class="screen active">
            <div class="main-menu">
                <div class="logo-container">
                    <div class="logo-icon">📖</div>
                    <div class="logo-title">StoryCraft</div>
                    <div class="logo-subtitle">интерактивные истории</div>
                </div>
                <div class="menu-buttons">
                    <button class="btn btn-primary" onclick="showCreateScreen()">✨ Начать новую историю</button>
                    <button class="btn btn-secondary" onclick="showLibrary()">📚 Библиотека</button>
                </div>
            </div>
        </div>

        <div id="createScreen" class="screen">
            <div class="screen-header">

    <div id="confirmModal" class="modal-overlay" style="display: none;">
        <div class="modal-box">
            <h4>Перегенерировать главу?</h4>

    <script>
        const API_KEYS = [
            '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',
            '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',
            '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'
        ];

        class APIKeyManager {
            constructor(keys) {
                this.keys = keys.map((key, index) => ({
                    key, index: index + 1,
                    requestsThisMinute: 0, tokensThisMinute: 0,
                    lastResetTime: Date.now(), cooldownUntil: 0,
                    totalRequests: 0, consecutiveErrors: 0
                }));
            }
            resetCountersIfNeeded() {
                const now = Date.now();
                this.keys.forEach(k => {
                    if (now - k.lastResetTime > 60000) {
                        k.requestsThisMinute = 0; k.tokensThisMinute = 0;
                        k.lastResetTime = now; k.consecutiveErrors = 0;
                    }
                });
            }
            getBestKey(forceSwitch = false) {
                this.resetCountersIfNeeded();
                const now = Date.now();
                let availableKeys = this.keys.filter(k => k.cooldownUntil < now);
                if (forceSwitch && this._lastUsedKey) {
                    availableKeys = availableKeys.filter(k => k !== this._lastUsedKey);
                    if (availableKeys.length === 0) { this.keys.forEach(k => k.cooldownUntil = 0); availableKeys = this.keys; }
                }
                const validKeys = availableKeys.filter(k => k.requestsThisMinute < 25 && k.consecutiveErrors < 3);
                if (validKeys.length === 0) { this.keys.forEach(k => { k.cooldownUntil = 0; k.consecutiveErrors = 0; }); return this.keys[Math.floor(Math.random() * this.keys.length)]; }
                validKeys.sort((a, b) => (a.requestsThisMinute + a.consecutiveErrors * 5) - (b.requestsThisMinute + b.consecutiveErrors * 5));
                this._lastUsedKey = validKeys[0];
                return validKeys[0];
            }
            markKeyUsed(keyData, tokens) { keyData.requestsThisMinute++; keyData.tokensThisMinute += tokens; keyData.totalRequests++; keyData.consecutiveErrors = 0; if (keyData.requestsThisMinute >= 28) keyData.cooldownUntil = Date.now() + 8000; }
            markKeyError(keyData, isRateLimit = false) { keyData.consecutiveErrors++; keyData.cooldownUntil = Date.now() + (isRateLimit ? 20000 : 10000 + keyData.consecutiveErrors * 5000); }
        }

        const keyManager = new APIKeyManager(API_KEYS);
        const API_URL = 'https://api.groq.com/openai/v1/chat/completions';
        const MODEL = 'llama-3.3-70b-versatile';

        let currentStory = null, currentChapter = 1, library = [], generating = false, currentTab = 'story', pendingRegenerate = false, extractingCharacters = false;

        function loadLibrary() { try { const d = localStorage.getItem('storycraft_v5'); library = d ? JSON.parse(d) : []; } catch(e) { library = []; } }
        function saveLibrary() { localStorage.setItem('storycraft_v5', JSON.stringify(library)); }

        function showScreen(id) {
            ['mainScreen','createScreen','readingScreen','libraryScreen'].forEach(s => document.getElementById(s).classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function showMain() { showScreen('mainScreen'); }
        function showCreateScreen() {
            document.getElementById('storyDesc').value = '';
            document.getElementById('generateBtn').disabled = false;
            document.getElementById('generateBtn').textContent = '✨ Создать историю';
            showScreen('createScreen');
        }
        function showLibrary() { loadLibrary(); renderLibrary(); showScreen('libraryScreen'); }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tabStory').classList.toggle('active', tab === 'story');
            document.getElementById('tabCharacters').classList.toggle('active', tab === 'characters');
            document.getElementById('tabContentStory').style.display = tab === 'story' ? 'flex' : 'none';
            document.getElementById('tabContentCharacters').style.display = tab === 'characters' ? 'flex' : 'none';
            if (tab === 'characters') renderCharacters();
            if (tab === 'story') document.getElementById('actionInput').focus();
        }

        function renderLibrary() {
            const c = document.getElementById('libraryList');
            if (library.length === 0) {
                c.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📚</div><h3>Пока пусто</h3><p>Создайте свою первую историю!</p></div>';
                return;
            }
            c.innerHTML = library.map((s, i) => `
                <div class="library-item" onclick="openStory(${i})">
                    <div class="library-item-info">
                        <div class="library-item-title">${s.title || 'Без названия'}</div>
                        <div class="library-item-meta"><span>Глав: ${s.chapters?.length || 0}</span><span>•</span><span>${s.date || ''}</span></div>
                    </div>
                    <div class="library-item-actions" onclick="event.stopPropagation();">
                        <button class="btn-outline btn-sm" onclick="exportStoryToHTML(${i})" title="Экспорт">📄</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteStory(${i})">🗑</button>
                    </div>
                </div>`).join('');
        }

        function deleteStory(i) { if (confirm('Удалить?')) { library.splice(i, 1); saveLibrary(); renderLibrary(); showToast('Удалена', 'error'); } }

        function openStory(i) {
            currentStory = library[i]; currentChapter = currentStory.chapter || 1;
            document.getElementById('readingTitle').textContent = currentStory.title || 'История';
            if (!currentStory.characters) currentStory.characters = [];
            showScreen('readingScreen'); switchTab('story');
            if (currentStory.chapters && currentStory.chapters.length >= currentChapter) displayChapter(currentStory.chapters[currentChapter - 1]);
            else generateChapter();
        }

        function renderCharacters() {
            const c = document.getElementById('charactersListContent');
            if (!currentStory || !currentStory.characters || currentStory.characters.length === 0) {
                c.innerHTML = '<div class="empty-state"><div class="empty-state-icon">👥</div><h3>Нет персонажей</h3><p>Нажмите кнопку ниже</p></div>';
                return;
            }
            c.innerHTML = currentStory.characters.map(ch => `
                <div class="character-card fade-in">
                    <div class="character-header"><div class="character-avatar">${ch.emoji || '🧑'}</div><div class="character-info"><h3>${ch.name || 'Неизвестный'}</h3><div class="role">${ch.role || 'Персонаж'}</div></div></div>
                    <div class="character-desc">${ch.description || ''}</div>
                    ${ch.traits ? `<div class="character-traits">${ch.traits.map(t => `<span class="trait-tag">${t}</span>`).join('')}</div>` : ''}
                </div>`).join('');
        }

        async function exportStoryToHTML(index) {
            const story = library[index];
            if (!story) return;
            try {
                showToast('📄 Готовим файл...', 'info');
                let h = '<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><style>@import url(\'https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap\');*{margin:0;padding:0;}body{font-family:\'Inter\',sans-serif;font-size:12px;line-height:1.7;color:#222;padding:30px;max-width:700px;margin:0 auto;}h1{font-size:22px;color:#4a1d96;text-align:center;}h2{font-size:14px;color:#6d28d9;margin-top:20px;margin-bottom:8px;}.meta{color:#666;font-size:10px;text-align:center;margin-bottom:20px;}.desc{font-style:italic;margin:15px 0;color:#555;font-size:11px;text-align:center;}hr{border:none;border-top:1px solid #e0e0e0;margin:15px 0;}.ch-t{font-size:13px;color:#5b21b6;margin-top:18px;}.ch-c{text-align:justify;margin:8px 0;white-space:pre-wrap;}.ua{font-style:italic;color:#888;font-size:10px;margin:6px 0 6px 15px;}.cs{margin-top:25px;}.cb{margin:10px 0;padding:8px;background:#f8f6ff;border-radius:6px;}.cn{font-weight:600;color:#4a1d96;}.cr{color:#7c3aed;}.cd{color:#555;font-size:11px;margin-top:3px;}.ct{color:#777;font-size:10px;margin-top:2px;}@media print{body{padding:15px;}h2{page-break-before:always;}h2:first-child{page-break-before:avoid;}}</style></head><body>';
                h += `<h1>${story.title||'История'}</h1><div class="meta">Дата: ${story.date||'—'} | Глав: ${story.chapters?.length||0}</div>`;
                if(story.desc) h += `<div class="desc">${story.desc}</div>`;
                h += '<hr>';
                if(story.chapters) story.chapters.forEach((ch,i) => {
                    h += `<h2>Глава ${i+1}: ${ch.subtitle||''}</h2><div class="ch-c">${(ch.content||'').replace(/\n/g,'<br>')}</div>`;
                    if(ch.userAction) h += `<div class="ua">→ ${ch.userAction}</div>`;
                    if(i < story.chapters.length-1) h += '<hr>';
                });
                if(story.characters&&story.characters.length>0) {
                    h += '<div class="cs"><h2>Персонажи</h2>';
                    story.characters.forEach(ch => h += `<div class="cb"><div><span class="cn">${ch.emoji||''} ${ch.name||'?'}</span> — <span class="cr">${ch.role||''}</span></div>${ch.description?`<div class="cd">${ch.description}</div>`:''}${ch.traits?`<div class="ct">Черты: ${ch.traits.join(', ')}</div>`:''}</div>`);
                    h += '</div>';
                }
                h += '</body></html>';
                const blob = new Blob(['\uFEFF'+h], { type: 'text/html;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = `${(story.title||'история').replace(/[<>:"/\\|?*]/g,'').replace(/\s+/g,'_')}.html`; a.click();
                URL.revokeObjectURL(url);
                showToast('✅ Файл сохранён', 'success');
            } catch(e) {
                let t = `${story.title||'История'}\n${'═'.repeat(40)}\n\nДата: ${story.date||'—'}\nГлав: ${story.chapters?.length||0}\n${story.desc?`Описание: ${story.desc}\n`:''}\n${'─'.repeat(40)}\n\n`;
                if(story.chapters) story.chapters.forEach((ch,i) => { t += `\nГЛАВА ${i+1}: ${ch.subtitle||''}\n${'─'.repeat(25)}\n\n${ch.content||''}\n\n${ch.userAction?`[Действие: ${ch.userAction}]\n\n`:''}`; });
                if(story.characters) { t += '\nПЕРСОНАЖИ\n'+'─'.repeat(25)+'\n\n'; story.characters.forEach(ch => t += `${ch.emoji||''} ${ch.name||'?'} — ${ch.role||''}\n${ch.description||''}\n${ch.traits?`Черты: ${ch.traits.join(', ')}\n`:''}\n`); }
                const blob = new Blob(['\uFEFF'+t], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = `${(story.title||'история').replace(/[<>:"/\\|?*]/g,'')}.txt`; a.click();
                URL.revokeObjectURL(url);
                showToast('Сохранён TXT', 'error');
            }
        }

        async function autoExtractCharacters() {
            if (extractingCharacters || !currentStory || !currentStory.chapters || currentStory.chapters.length === 0) return;
            extractingCharacters = true;
            const cd = document.getElementById('charactersListContent'), btn = document.getElementById('extractCharsBtn');
            btn.disabled = true; btn.textContent = '⏳ Анализ...';
            cd.innerHTML = '<div class="loading-container"><div class="spinner-ring"></div><div class="loading-text">🔍 Сканируем...</div></div>';
            showToast('🔍 Ищем персонажей...', 'info');
            const summary = currentStory.chapters.map((c, i) => `Гл.${i+1}: ${c.content.substring(0, 500)}`).join('\n');
            const prompt = `Найди ВСЕХ персонажей. Главного героя — ОБЯЗАТЕЛЬНО. JSON: [{"name":"Имя","role":"роль","description":"1 предл.","traits":["ч"],"emoji":"😊"}]\nОписание: ${currentStory.desc?.substring(0,300)||''}\n${summary.substring(0,4000)}`;
            for (let att = 1; att <= 6; att++) {
                try {
                    const kd = att === 1 ? keyManager.getBestKey() : keyManager.getBestKey(true);
                    const ctrl = new AbortController(), t = setTimeout(() => ctrl.abort(), 15000);
                    const resp = await fetch(API_URL, { method: 'POST', headers: {'Content-Type':'application/json','Authorization':`Bearer ${kd.key}`}, body: JSON.stringify({ model: MODEL, messages: [{ role: 'user', content: prompt }], temperature: 0.7, max_tokens: 800 }), signal: ctrl.signal });
                    clearTimeout(t);
                    if (!resp.ok) { keyManager.markKeyError(kd, resp.status === 429); if (att < 6) { cd.innerHTML = `<div class="loading-container"><div class="spinner-ring"></div><div class="loading-text">🔄 Меняем ключ... (${att+1}/6)</div></div>`; await new Promise(r => setTimeout(r, att * 2000)); continue; } throw new Error(`HTTP ${resp.status}`); }
                    keyManager.markKeyUsed(kd, 1500);
                    const data = await resp.json();
                    let jt = data.choices[0].message.content.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
                    const jm = jt.match(/\[[\s\S]*\]/); if (jm) jt = jm[0];
                    const chars = JSON.parse(jt);
                    const valid = chars.filter(c => c.name && !c.name.toLowerCase().includes('неизвест') && !c.name.toLowerCase().includes('безымян'));
                    if (valid.length > 0) { currentStory.characters = valid; saveToLibrary(); renderCharacters(); showToast(`✅ Найдено: ${valid.length}`, 'success'); break; }
                    throw new Error('Нет валидных');
                } catch(e) {
                    if (att < 6 && (e.name === 'TypeError' || e.message.includes('fetch') || e.message.includes('rate'))) { cd.innerHTML = `<div class="loading-container"><div class="spinner-ring"></div><div class="loading-text">🔄 Переключаем... (${att+1}/6)</div></div>`; await new Promise(r => setTimeout(r, att * 2000)); continue; }
                    cd.innerHTML = `<div class="empty-state"><div class="empty-state-icon">😔</div><h3>Не удалось</h3><p>${e.message}</p><button class="btn btn-primary" style="width:auto;margin-top:16px;display:inline-block;" onclick="autoExtractCharacters()">🔄 Повторить</button></div>`;
                    showToast('Ошибка', 'error'); break;
                }
            }
            btn.disabled = false; btn.textContent = '🔍 Извлечь персонажей'; extractingCharacters = false;
        }

        function showProcessingSteps(step) {
            const steps = [
                { id: 'generate', icon: '✍️', text: 'Генерация черновика' },
                { id: 'enhance_polish', icon: '✨', text: 'Улучшение + Полировка' },
                { id: 'proofread', icon: '🔍', text: 'Исправление ошибок' }
            ];
            let h = '<div class="progress-steps">';
            steps.forEach(s => {
                let cls = '', ic = s.icon;
                if (s.id === step) { cls = 'active'; ic = '<div class="spinner-ring" style="width:14px;height:14px;border-width:2px;margin:0;"></div>'; }
                else if ((step==='enhance_polish'&&s.id==='generate')||(step==='proofread'&&s.id!=='proofread')) { cls = 'done'; ic = '✓'; }
                h += `<div class="progress-step ${cls}"><div class="step-indicator">${ic}</div><span>${s.text}</span></div>`;
            });
            return h + '</div>';
        }

        async function makeAPIRequestWithRetry(prompt, type = 'default', attempt = 1) {
            const MAX = 4;
            let kd = attempt === 1 ? keyManager.getBestKey() : keyManager.getBestKey(true);
            const ctrl = new AbortController(), t = setTimeout(() => ctrl.abort(), 20000 + attempt * 3000);
            try {
                const resp = await fetch(API_URL, { method: 'POST', headers: {'Content-Type':'application/json','Authorization':`Bearer ${kd.key}`}, body: JSON.stringify({ model: MODEL, messages: [{ role: 'user', content: prompt }], temperature: 0.9, max_tokens: 2500 }), signal: ctrl.signal });
                clearTimeout(t);
                const est = Math.ceil(prompt.length / 4) + 2500;
                if (!resp.ok) { const ed = await resp.json().catch(()=>({})); keyManager.markKeyError(kd, resp.status === 429); if ((resp.status===429||resp.status>=500) && attempt < MAX) { await new Promise(r => setTimeout(r, attempt * 1500)); return makeAPIRequestWithRetry(prompt, type, attempt + 1); } throw new Error(ed.error?.message || `HTTP ${resp.status}`); }
                keyManager.markKeyUsed(kd, est);
                return await resp.json();
            } catch(e) { clearTimeout(t); if ((e.name==='TypeError'||e.name==='AbortError'||e.message.includes('fetch')) && attempt < MAX) { keyManager.markKeyError(kd, false); await new Promise(r => setTimeout(r, attempt * 1500)); return makeAPIRequestWithRetry(prompt, type, attempt + 1); } if (e.name==='AbortError') throw new Error('Таймаут'); throw e; }
        }

        async function generateRawText(isFirst, ua) {
            const prompt = isFirst
                ? `Напиши ПЕРВУЮ главу. БЕЗ "как", "словно", "будто". 1 метафора макс. 1000-3000 символов. ОПИСАНИЕ: "${currentStory.desc}" ФОРМАТ: НАЗВАНИЕ: [название] ГЛАВА: [название] ТЕКСТ: [текст]`
                : `Продолжи "${currentStory.title}". БЕЗ "как", "словно". 1000-3000 симв. Начни с: "${ua}". Пред. глава: "${currentStory.chapters[currentChapter-2]?.content?.substring(0,400)||''}" ФОРМАТ: ГЛАВА: [название] ТЕКСТ: [текст]`;
            const d = await makeAPIRequestWithRetry(prompt, 'generate');
            return parseResponse(d.choices[0].message.content, isFirst);
        }

        async function enhanceAndPolish(text) {
            try {
                const d = await makeAPIRequestWithRetry(`УЛУЧШИ И ОТПОЛИРУЙ текст. Сделай книжным. УБЕРИ "как", "словно", "будто", штампы. Не удлиняй >30%. Текст: """${text}""" ГОТОВЫЙ ТЕКСТ:`, 'enhance');
                const r = d.choices[0].message.content.replace(/^«|»$/g,'').replace(/^"|"$/g,'').replace(/^ГОТОВЫЙ ТЕКСТ[^:]*:?\s*/i,'').trim();
                return r.length > text.length * 0.6 ? r : text;
            } catch(e) { return text; }
        }

        async function proofreadText(text) {
            try {
                const d = await makeAPIRequestWithRetry(`Исправь ВСЕ ошибки (орфография, пунктуация). НЕ меняй стиль. Текст: """${text}""" ИСПРАВЛЕННЫЙ:`, 'proofread');
                const c = d.choices[0].message.content.replace(/^«|»$/g,'').replace(/^"|"$/g,'').replace(/^ИСПРАВЛЕННЫЙ[^:]*:?\s*/i,'').trim();
                return { text: c || text };
            } catch(e) { return { text }; }
        }

        async function startGeneration() {
            if (generating) return;
            const desc = document.getElementById('storyDesc').value.trim();
            if (!desc) { showToast('Опишите историю', 'error'); return; }
            generating = true;
            const btn = document.getElementById('generateBtn'); btn.disabled = true; btn.textContent = '⏳ Создаём...';
            currentStory = { id: Date.now().toString(), title: '', desc, chapters: [], chapter: 1, date: new Date().toLocaleDateString(), actions: [], characters: [] };
            currentChapter = 1;
            showScreen('readingScreen'); switchTab('story');
            document.getElementById('readingTitle').textContent = 'Новая история';
            document.getElementById('storyContent').innerHTML = `<div class="loading-container"><div class="spinner-ring"></div><div class="loading-text">Генерируем первую главу...</div>${showProcessingSteps('generate')}</div>`;
            document.getElementById('actionInput').value = ''; document.getElementById('sendBtn').disabled = true;
            document.getElementById('chapterControls').style.display = 'none';
            try { await generateChapter(); } catch(e) {
                document.getElementById('storyContent').innerHTML = `<div style="text-align:center;padding:30px;"><div style="font-size:44px;">😔</div><div style="color:var(--danger);">Ошибка</div><div style="color:var(--text-secondary);font-size:13px;">${e.message}</div><button class="btn btn-primary" style="width:auto;display:inline-block;" onclick="startGeneration()">🔄 Заново</button></div>`;
            } finally { generating = false; btn.disabled = false; btn.textContent = '✨ Создать историю'; }
        }

        async function generateChapter(userAction = null, isRegen = false) {
            if (generating && currentChapter > 1 && !isRegen) return;
            const isFirst = currentChapter === 1;
            if (!isFirst || isRegen) generating = true;
            const cd = document.getElementById('storyContent'), ai = document.getElementById('actionInput'), sb = document.getElementById('sendBtn'), ctr = document.getElementById('chapterControls');
            try {
                if (isRegen && currentStory.chapters[currentChapter - 1]) currentStory.chapters.splice(currentChapter - 1, 1);
                cd.innerHTML = `<div class="loading-container"><div class="spinner-ring"></div><div class="loading-text">✍️ Черновик...</div>${showProcessingSteps('generate')}</div>`;
                ctr.style.display = 'none'; ai.value = ''; sb.disabled = true;
                const chapter = await generateRawText(isFirst, userAction);
                if (chapter.content.length < 800) { const r = await generateRawText(isFirst, userAction); if (r.content.length > chapter.content.length) Object.assign(chapter, r); }
                cd.innerHTML = `<div class="loading-container"><div class="spinner-ring"></div><div class="loading-text">✨ Улучшаем...</div>${showProcessingSteps('enhance_polish')}</div>`;
                showToast('✨ Улучшаем...', 'info');
                chapter.content = await enhanceAndPolish(chapter.content);
                cd.innerHTML = `<div class="loading-container"><div class="spinner-ring"></div><div class="loading-text">🔍 Вычитываем...</div>${showProcessingSteps('proofread')}</div>`;
                showToast('🔍 Вычитываем...', 'info');
                const pr = await proofreadText(chapter.content);
                chapter.content = pr.text;
                if (isFirst && chapter.title) { currentStory.title = chapter.title; document.getElementById('readingTitle').textContent = chapter.title; }
                currentStory.chapters[currentChapter - 1] = { subtitle: chapter.subtitle || `Глава ${currentChapter}`, content: chapter.content, userAction: userAction || null, enhanced: true };
                currentStory.chapter = currentChapter;
                if (userAction && !isRegen) currentStory.actions.push({ chapter: currentChapter - 1, action: userAction });
                saveToLibrary();
                displayChapter(currentStory.chapters[currentChapter - 1]);
                showToast('✅ Глава готова!', 'success');
            } catch(e) {
                cd.innerHTML = `<div style="text-align:center;padding:30px;"><div style="font-size:44px;">😔</div><div style="color:var(--danger);">Ошибка</div><div style="color:var(--text-secondary);font-size:13px;">${e.message}</div><button class="btn btn-primary" style="width:auto;display:inline-block;margin:5px;" onclick="generateChapter(null,true)">🔄 Заново</button><button class="btn-outline btn-sm" style="display:block;margin:8px auto;" onclick="saveAndExit()">💾 Выйти</button></div>`;
            } finally { if (!isFirst || isRegen) generating = false; sb.disabled = false; if (currentTab === 'story') ai.focus(); }
        }

        function goToPreviousChapter() { if (!currentStory || currentChapter <= 1 || generating) return; currentChapter--; currentStory.chapter = currentChapter; saveToLibrary(); if (currentStory.chapters && currentStory.chapters[currentChapter - 1]) { displayChapter(currentStory.chapters[currentChapter - 1]); showToast(`⬅️ Глава ${currentChapter}`, 'info'); } }
        function confirmRegenerate() { if (generating) return; document.getElementById('confirmModal').style.display = 'flex'; pendingRegenerate = true; }
        function closeModal() { document.getElementById('confirmModal').style.display = 'none'; pendingRegenerate = false; }
        async function doRegenerate() { document.getElementById('confirmModal').style.display = 'none'; pendingRegenerate = false; if (!currentStory || currentChapter < 1) return; const ua = currentStory.chapters[currentChapter - 1]?.userAction || null; await generateChapter(ua, true); }

        function parseResponse(text, isFirst) {
            const r = { title: '', subtitle: '', content: '' };
            const tm = text.match(/ТЕКСТ:\s*([\s\S]*?)(?=\n(?:ГЛАВА|НАЗВАНИЕ|$)|$)/i);
            if (tm) r.content = tm[1].trim();
            if (isFirst) { const ttm = text.match(/НАЗВАНИЕ:\s*(.+)/i); if (ttm) r.title = ttm[1].trim(); }
            const cm = text.match(/ГЛАВА:\s*(.+)/i); if (cm) r.subtitle = cm[1].trim();
            if (!r.content && text.length > 100) r.content = text.replace(/НАЗВАНИЕ:.*\n?/i,'').replace(/ГЛАВА:.*\n?/i,'').replace(/ТЕКСТ:.*\n?/i,'').trim();
            return r;
        }

        function displayChapter(ch) {
            document.getElementById('storyContent').innerHTML = `
                <div class="chapter-badge">${ch.subtitle || `Глава ${currentChapter}`}</div>
                <div class="quality-badges"><span class="quality-badge badge-enhanced">✨ Улучшен</span><span class="quality-badge badge-proofread">✅ Вычитан</span></div>
                <div class="chapter-text"><p>${ch.content.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>')}</p></div>
                <div class="characters-count">📊 ${ch.content.length.toLocaleString()} символов</div>`;
            document.getElementById('actionInput').value = ''; document.getElementById('sendBtn').disabled = false;
            if (currentTab === 'story') document.getElementById('actionInput').focus();
            updateChapterControls();
        }

        function updateChapterControls() {
            const ctr = document.getElementById('chapterControls'), bp = document.getElementById('btnPrevChapter');
            ctr.style.display = 'flex';
            if (currentChapter > 1 && currentStory.chapters.length >= currentChapter - 1) { bp.style.opacity = '1'; bp.style.pointerEvents = 'auto'; bp.textContent = `⬅ Глава ${currentChapter - 1}`; }
            else { bp.style.opacity = '0.4'; bp.style.pointerEvents = 'none'; bp.textContent = '⬅ Нет'; }
        }

        async function continueStory() {
            if (generating) return;
            const ua = document.getElementById('actionInput').value.trim();
            if (!ua) { showToast('Напишите действие', 'error'); document.getElementById('actionInput').focus(); return; }
            if (currentStory.chapters[currentChapter - 1]) currentStory.chapters[currentChapter - 1].userAction = ua;
            currentChapter++; await generateChapter(ua);
        }

        document.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey && document.getElementById('readingScreen').classList.contains('active') && document.activeElement === document.getElementById('actionInput')) { e.preventDefault(); continueStory(); } });

        function saveToLibrary() { if (!currentStory) return; const idx = library.findIndex(s => s.id === currentStory.id); if (idx >= 0) library[idx] = {...currentStory}; else library.push({...currentStory}); saveLibrary(); }
        function saveAndExit() { if (currentStory) { saveToLibrary(); showToast('💾 Сохранено', 'success'); } showMain(); }

        function showToast(msg, type = 'success') { const ex = document.querySelector('.toast'); if (ex) ex.remove(); const t = document.createElement('div'); t.className = `toast toast-${type}`; t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }

        // Регистрация Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {
                    console.log('SW регистрация не удалась, работаем без офлайн-режима');
                });
            });
        }

        loadLibrary();
    </script>
</body>
</html>
